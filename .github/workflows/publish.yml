name: Publish Blog

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context:.
          file:./Dockerfile.multistage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-config-repo:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    
    steps:
      - name: Get the version tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          repository: 'aguidirh/blog-config-repo'
          token: ${{ secrets.CONFIG_REPO_PAT }}

      - name: Update Kubernetes deployment with new image tag
        run: |
          sed -i 's|image: ghcr.io/aguidirh/blog-content-repo:.*|image: ghcr.io/aguidirh/blog-content-repo:${{ env.VERSION }}|' blog-app/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions-bot@github.com'
          git add.
          git commit -m "Update blog image to version ${{ env.VERSION }}"
          git push
